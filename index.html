<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Client</title>
    <style>
        /* Reset margins and disable text selection */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Fallback font */
            background-color: #111;
        }

        /* Minecraft Dirt Background Styling */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Uses a base64 pixelated pattern resembling classic background dirt/stone blocks */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://w3.org" width="16" height="16" viewBox="0 0 16 16"><rect width="16" height="16" fill="%232b2622"/><rect width="4" height="4" fill="%233c3530"/><rect x="8" y="8" width="4" height="4" fill="%233c3530"/><rect x="4" y="4" width="4" height="4" fill="%231a1715"/><rect x="12" y="12" width="4" height="4" fill="%231a1715"/></svg>');
            background-size: 64px 64px;
            filter: brightness(0.4);
            image-rendering: pixelated;
            z-index: 1;
        }

        /* Container for UI elements */
        .ui-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
        }

        /* Minecraft Logo Placeholder styling */
        .logo-container {
            margin-bottom: 40px;
            text-align: center;
        }

        .minecraft-logo {
            font-size: 48px;
            font-weight: bold;
            color: #c6c6c6;
            text-shadow: 4px 4px 0px #555555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Button Grid Layout */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 400px;
        }

        .row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Classic Minecraft Button Styling */
        .mc-button {
            width: 100%;
            height: 40px;
            background-color: #a8a8a8;
            border: 2px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            color: #e0e0e0;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #3f3f3f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        /* Button Hover Effects */
        .mc-button:hover {
            background-color: #7ba4ff;
            border-top-color: #cbe0ff;
            border-left-color: #cbe0ff;
            border-bottom-color: #3b5599;
            border-right-color: #3b5599;
            color: #ffffff;
            text-shadow: 2px 2px 0px #1e2d54;
        }

        /* Button Active / Clicked State */
        .mc-button:active {
            border-bottom-color: #fff;
            border-right-color: #fff;
            border-top-color: #555;
            border-left-color: #555;
            padding-top: 2px;
            padding-left: 2px;
        }

        .half-width {
            width: 50%;
        }

        /* Footer Text Styling */
        .footer-text {
            position: absolute;
            bottom: 10px;
            color: #a0a0a0;
            font-size: 14px;
            text-shadow: 1px 1px 0px #000;
        }

        .footer-left { left: 15px; }
        .footer-right { right: 15px; }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div class="background"></div>

    <!-- Interface Layer -->
    <div class="ui-container">
        
        <!-- Logo Display -->
        <div class="logo-container">
            <div class="minecraft-logo">MINECRAFT</div>
        </div>

        <!-- Menu Navigation Layout -->
        <div class="menu-buttons">
            <!-- Custom Buttons Requested -->
            <button class="mc-button" onclick="handleButtonClick('1.12.2')">1.12.2</button>
            <button class="mc-button" onclick="handleButtonClick('1.1.8')">1.1.8</button>
            
            <!-- Standard Submenus -->
            <div class="row">
                <button class="mc-button half-width" onclick="handleButtonClick('Options')">Options...</button>
                <button class="mc-button half-width" onclick="handleButtonClick('Quit')">Quit Game</button>
            </div>
        </div>

        <!-- System Details Overlay -->
        <div class="footer-text footer-left">Minecraft 1.8.8 (Eaglercraft Edition)</div>
        <div class="footer-text footer-right">Copyright Mojang Studios. Do not distribute!</div>

    </div>

    <!-- Logic Script for Button Controls -->
    <script>
        function handleButtonClick(action) {
            console.log("Button clicked: " + action);
            
            if (action === '1.12.2') {
                alert("Loading interface configuration for version 1.12.2...");
                // Add your custom logic here (e.g., window.location.href = 'your_game_url';)
            } else if (action === '1.1.8') {
                alert("Loading interface configuration for version 1.1.8...");
            } else if (action === 'Options') {
                alert("Opening Settings Menu...");
            } else if (action === 'Quit') {
                if (confirm("Are you sure you want to close the menu?")) {
                    window.close();
                }
            }
        }
    </script>
</body>
</html>
